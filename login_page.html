<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LiquiSwap - Premium Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007f80",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2323",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(15, 35, 35, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 127, 128, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .liquid-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #007f80 0%, #004d4d 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
        }
        .blob-1 { top: -10%; left: -10%; }
        .blob-2 { bottom: -10%; right: -10%; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center relative overflow-hidden text-slate-900 dark:text-slate-100">
<!-- Background Elements -->
<div class="liquid-blob blob-1"></div>
<div class="liquid-blob blob-2"></div>
<!-- Main Container -->
<div class="w-full max-w-[440px] px-6 py-12">
<!-- Logo -->
<div class="flex flex-col items-center gap-4 mb-10">
<div class="bg-primary/20 p-3 rounded-xl border border-primary/30">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1">water_drop</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100">LiquiSwap</h1>
</div>
<!-- Glass Card -->
<div class="glass-card rounded-xl overflow-hidden">
<!-- Tabs -->
<div class="flex border-b border-primary/20">
<button class="flex-1 py-4 text-sm font-semibold border-b-2 border-primary text-primary transition-all">
                    Sign In
                </button>
<button class="flex-1 py-4 text-sm font-semibold border-b-2 border-transparent text-slate-500 dark:text-slate-400 hover:text-primary transition-all">
                    Create Account
                </button>
</div>
<!-- Form Body -->
<div class="p-8 space-y-6">
<!-- Phone Input -->
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1">Phone Number</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
<span class="text-lg mr-2">🇨🇲</span>
<span class="text-slate-400 dark:text-slate-500 text-sm font-medium">+237</span>
</div>
<input class="w-full bg-slate-100 dark:bg-background-dark/50 border border-slate-200 dark:border-primary/20 rounded-lg py-4 pl-24 pr-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="6XX XXX XXX" type="tel"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Password</label>
</div>
<div class="relative group">
<input class="w-full bg-slate-100 dark:bg-background-dark/50 border border-slate-200 dark:border-primary/20 rounded-lg py-4 pl-4 pr-12 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between">
<label class="relative flex items-center cursor-pointer group">
<input class="sr-only peer" type="checkbox"/>
<div class="w-10 h-5 bg-slate-200 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
<span class="ml-3 text-sm font-medium text-slate-600 dark:text-slate-400 group-hover:text-primary transition-colors">Remember me</span>
</label>
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-all drop-shadow-[0_0_8px_rgba(0,127,128,0.4)]" href="#">Forgot password?</a>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2">
<span>Secure Sign In</span>
<span class="material-symbols-outlined text-xl">login</span>
</button>
<!-- Divider -->
<div class="relative py-2">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-primary/20"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-background-dark/0 px-2 text-slate-500 dark:text-slate-500">Or continue with</span>
</div>
</div>
<!-- Biometric & Social -->
<div class="grid grid-cols-1 gap-4">
<button class="flex items-center justify-center gap-3 w-full bg-slate-100 dark:bg-primary/10 border border-slate-200 dark:border-primary/30 hover:bg-primary/20 text-slate-700 dark:text-slate-300 font-semibold py-3 rounded-lg transition-all">
<span class="material-symbols-outlined text-primary">face</span>
<span>Sign in with Face ID</span>
</button>
</div>
</div>
</div>
<!-- Footer Info -->
<p class="mt-8 text-center text-sm text-slate-500 dark:text-slate-500">
            By signing in, you agree to our 
            <a class="text-primary hover:underline" href="#">Terms</a> and 
            <a class="text-primary hover:underline" href="#">Privacy Policy</a>
</p>
</div>
<!-- Decorative Bottom Gradient -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>
</body></html>
