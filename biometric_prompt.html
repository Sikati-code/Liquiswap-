<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007f80",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2323",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-modal {
            background: rgba(15, 35, 35, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 127, 128, 0.2);
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #007f80, transparent);
            box-shadow: 0 0 15px #007f80;
            position: absolute;
            width: 100%;
            top: 50%;
            /* Note: Animation is requested but the system prompt says "DO NOT add any animations in CSS or Javascript". I will design the static "scanning" state visually. */
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Main App Background (Mockup of LiquiSwap Dashboard) -->
<div class="fixed inset-0 z-0 opacity-40 pointer-events-none overflow-hidden">
<div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_50%_50%,_#007f8033_0%,_transparent_50%)]"></div>
<div class="layout-container flex h-full grow flex-col max-w-[960px] mx-auto">
<header class="flex items-center justify-between px-10 py-6 border-b border-primary/20">
<div class="flex items-center gap-4 text-primary">
<span class="material-symbols-outlined text-3xl">account_balance_wallet</span>
<h2 class="text-xl font-bold tracking-tight">LiquiSwap</h2>
</div>
<div class="flex gap-4">
<div class="w-10 h-10 rounded-lg bg-primary/10 border border-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">notifications</span>
</div>
<div class="w-10 h-10 rounded-lg bg-primary/10 border border-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">person</span>
</div>
</div>
</header>
<div class="p-10 grid grid-cols-2 gap-6">
<div class="h-40 rounded-xl bg-primary/5 border border-primary/10"></div>
<div class="h-40 rounded-xl bg-primary/5 border border-primary/10"></div>
<div class="h-64 col-span-2 rounded-xl bg-primary/5 border border-primary/10"></div>
</div>
</div>
</div>
<!-- Biometric Prompt Modal -->
<div class="relative z-10 w-full max-w-md">
<div class="glass-modal rounded-3xl p-8 shadow-2xl flex flex-col items-center text-center">
<!-- Close Button -->
<button class="absolute top-6 right-6 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<!-- Biometric Icon / Scanning Area -->
<div class="relative w-32 h-32 mb-8 flex items-center justify-center">
<!-- Outer Ring -->
<div class="absolute inset-0 rounded-full border-2 border-primary/20"></div>
<div class="absolute inset-2 rounded-full border border-primary/40 border-dashed"></div>
<!-- Fingerprint/Face Icon -->
<div class="relative z-10 text-primary opacity-80">
<span class="material-symbols-outlined text-7xl font-light">fingerprint</span>
</div>
<!-- Static Scan Line (Representing the animation request) -->
<div class="scan-line z-20"></div>
<!-- Glowing effect -->
<div class="absolute inset-0 bg-primary/10 blur-2xl rounded-full"></div>
</div>
<!-- Content -->
<h3 class="text-2xl font-bold mb-3 text-slate-100">Enable Face ID?</h3>
<p class="text-slate-400 text-sm leading-relaxed mb-8 px-4">
                Secure your assets and speed up your transactions with biometric authentication. This ensures only you can access your funds.
            </p>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">verified_user</span>
                    Enable Biometrics
                </button>
<button class="w-full bg-transparent hover:bg-white/5 text-slate-400 hover:text-white font-semibold py-3 rounded-xl transition-all">
                    Skip for now
                </button>
</div>
<!-- Security Badge -->
<div class="mt-8 flex items-center gap-2 text-[10px] uppercase tracking-widest text-primary/60 font-bold">
<span class="material-symbols-outlined text-sm">lock</span>
                End-to-end encrypted
            </div>
</div>
<!-- Footer Visual Hint -->
<div class="mt-6 flex justify-center gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-primary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/30"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/30"></div>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
</body></html>
